name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }}
        env:
          GODOT_VERSION: "4.6.1"
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install export templates
        env:
          GODOT_VERSION: "4.6.1"
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          rm -rf templates

      - name: Import project (build cache)
        run: |
          godot --headless --import 2>&1 || true

      - name: Export Web
        run: |
          mkdir -p web-build
          godot --headless --export-release "Web" web-build/index.html

      - name: Add COOP/COEP headers via service worker (SharedArrayBuffer fix)
        run: |
          cat > web-build/coi-serviceworker.js << 'EOF'
          /* coi-serviceworker v0.1.7 — github.com/gzuidhof/coi-serviceworker */
          self.addEventListener("install",()=>self.skipWaiting());
          self.addEventListener("activate",e=>e.waitUntil(self.clients.claim()));
          function coiHeaders(headers){
            const h=new Headers(headers);
            h.set("Cross-Origin-Opener-Policy","same-origin");
            h.set("Cross-Origin-Embedder-Policy","require-corp");
            return h;
          }
          self.addEventListener("fetch",e=>{
            if(e.request.cache==="only-if-cached"&&e.request.mode!=="same-origin")return;
            e.respondWith(fetch(e.request).then(r=>new Response(r.body,{status:r.status,statusText:r.statusText,headers:coiHeaders(r.headers)})));
          });
          EOF

          # Inject service worker registration into Godot's index.html
          sed -i 's|</head>|<script>if(typeof SharedArrayBuffer==="undefined"){const r=document.createElement("script");r.src="coi-serviceworker.js";document.head.appendChild(r);}</script></head>|' web-build/index.html

      - name: Add .nojekyll
        run: touch web-build/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-build
          force_orphan: true
